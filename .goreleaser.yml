version: 2

project_name: vanta-cli

builds:
  - targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
