[tools]
go = "latest"
"go:honnef.co/go/tools/cmd/staticcheck" = "latest"

[tasks."build"]
description = "Build binary"
run = """
go build
echo "./vanta-cli"
"""

[tasks."test"]
description = "Run tests"
run = """
mise run test:lint
mise run test:fmt
mise run test:unit
"""

[tasks."test:lint"]
description = "Run lint tests"
run = """
go vet
staticcheck
"""

[tasks."test:fmt"]
description = "Run fmt tests"
run = """
go fmt
"""

[tasks."test:unit"]
description = "Run unit tests"
run = """
go test -v ./...
"""
